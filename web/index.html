<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>機票最低價追蹤</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#004e9f" />
    <script>
      // GitHub Pages SPA redirect 還原：將 ?/s/TOKEN 還原為真實路徑
      (function (l) {
        if (l.search[1] === "/") {
          var path = decodeURIComponent(l.search.slice(2));
          window.history.replaceState(null, null, l.pathname + path + l.hash);
        }
      })(window.location);
    </script>
    <script>
      (function () {
        var k = "flight-tracker-theme";
        var s;
        try {
          s = localStorage.getItem(k);
        } catch (e) {
          s = null;
        }
        var dark =
          s === "dark" || (!s && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="機票追蹤" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
