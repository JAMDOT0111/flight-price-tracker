services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flight_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-flight_tracker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flight}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "npm run build:shared && npx prisma generate --schema=server/prisma/schema.prisma && npx prisma migrate deploy --schema=server/prisma/schema.prisma && npm run dev:server"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://flight:flight_dev_pw@db:5432/flight_tracker?schema=public}
      SERVER_PORT: 3001
      FLIGHT_PROVIDER: ${FLIGHT_PROVIDER:-mock}
      PROVIDER_CHAIN: ${PROVIDER_CHAIN:-}
      DUFFEL_API_TOKEN: ${DUFFEL_API_TOKEN:-}
      DUFFEL_SEARCH_LIMIT: ${DUFFEL_SEARCH_LIMIT:-}
      IGNAV_API_KEY: ${IGNAV_API_KEY:-}
      IGNAV_MARKET: ${IGNAV_MARKET:-TW}
      IGNAV_SEARCH_LIMIT: ${IGNAV_SEARCH_LIMIT:-}
      GOOGLE_FLIGHTS_SEARCH_LIMIT: ${GOOGLE_FLIGHTS_SEARCH_LIMIT:-}
      SKYSCANNER_SEARCH_LIMIT: ${SKYSCANNER_SEARCH_LIMIT:-}
      TRIP_SEARCH_LIMIT: ${TRIP_SEARCH_LIMIT:-}
      RUN_SECRET: ${RUN_SECRET:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - server_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  web:
    # 前端固定用本機 `npm run dev:web` 開發，避免容器(root)寫壞 web/node_modules/.vite
    # 並與本機 vite 搶 5173。預設不啟動；需要容器化前端時用 `docker compose --profile web up`。
    profiles: ["web"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "npm run build:shared && npm run dev:web"
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - server

volumes:
  pgdata:
  server_node_modules:
  web_node_modules:
