name: Flight Price Scraper

on:
  # server 內建 node-cron 排程器（每 30 分鐘自動跑），不需要 GitHub Actions 定時觸發
  # 保留 workflow_dispatch 供手動測試用
  workflow_dispatch:
    inputs:
      provider:
        description: "指定來源（google-flights / ignav / 留空=全部）"
        required: false
        default: ""

jobs:
  google-flights:
    name: Google Flights 每小時掃描
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event.schedule == '0 * * * *' ||
      github.event.inputs.provider == 'google-flights' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.provider == '')
    steps:
      - name: 連線 Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --accept-routes

      - name: 觸發 Google Flights 追蹤
        run: |
          curl -sf -X POST "http://100.93.53.27:3001/api/run-all" \
            -H "Authorization: Bearer ${{ secrets.RUN_SECRET }}" \
            -H "X-Provider-Override: google-flights" \
            --fail-with-body

  ignav:
    name: Ignav 每週掃描
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event.schedule == '0 2 * * 1' ||
      github.event.inputs.provider == 'ignav' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.provider == '')
    steps:
      - name: 連線 Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --accept-routes

      - name: 觸發 Ignav 追蹤
        run: |
          curl -sf -X POST "http://100.93.53.27:3001/api/run-all" \
            -H "Authorization: Bearer ${{ secrets.RUN_SECRET }}" \
            -H "X-Provider-Override: ignav" \
            --fail-with-body
